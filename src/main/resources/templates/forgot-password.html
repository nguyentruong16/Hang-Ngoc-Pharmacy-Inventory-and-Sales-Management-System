<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Forgot Password - Pharmacy Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
  <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">
  <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
  <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">
</head>

<body>
<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <a href="/signin" th:href="@{/signin}" class="mb-4 d-inline-block">
          <img src="./assets/images/logo.svg" th:src="@{/assets/images/logo.svg}" alt="Pharmacy Management System">
        </a>
        <h1 class="card-title h5 mb-2">Forgot password</h1>
        <p class="text-secondary small mb-0">Enter your staff email to receive a password reset link.</p>
      </div>

      <div class="alert alert-info py-2" role="alert" th:if="${message}" th:text="${message}"></div>

      <form class="needs-validation mt-3" method="post" th:action="@{/forgot-password}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input id="email" name="email" type="email" class="form-control" placeholder="name@example.com" required autofocus>
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>

        <button class="btn btn-primary w-100" type="submit">Send reset link</button>
      </form>

      <div class="text-center mt-3 small">
        <a href="/signin" th:href="@{/signin}" class="link-primary">Back to sign in</a>
      </div>
    </div>
  </div>
</div>
</body>

</html>
