<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title th:text="'Chi tiết chi nhánh - ' + ${branch.name}">Chi tiết chi nhánh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
  <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">
  <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
  <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">
  <style>
    :root {
      --profile-green: #059669;
      --profile-green-dark: #047857;
      --profile-green-light: #dff3ec;
      --profile-border: #e5e7eb;
      --profile-muted: #6b7280;
      --profile-bg: #f6f7f9;
    }

    body {
      background: var(--profile-bg);
    }

    .profile-page-title {
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .profile-card {
      background: #ffffff;
      border: 1px solid var(--profile-border);
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
    }

    .profile-avatar {
      width: 96px;
      height: 96px;
      border-radius: 999px;
      background: var(--profile-green-light);
      color: var(--profile-green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
    }

    .profile-status-badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: #dcfce7;
      color: #059669;
    }

    .profile-status-badge.inactive {
      background: #fee2e2;
      color: #dc2626;
    }

    .profile-muted {
      color: var(--profile-muted);
    }

    .profile-form-card {
      max-width: 760px;
    }

    .profile-form-card .form-label {
      font-size: 13px;
      color: #111827;
      margin-bottom: 8px;
    }

    .profile-form-card .form-control {
      min-height: 40px;
      border-radius: 10px;
      border-color: var(--profile-border);
      font-size: 13px;
    }

    .profile-form-card .form-control:disabled,
    .profile-form-card .form-control[readonly] {
      background: #f9fafb;
      color: #9ca3af;
      opacity: 1;
    }

    .btn-profile-outline {
      border: 1px solid var(--profile-border);
      background: #ffffff;
      color: #111827;
      border-radius: 10px;
      min-height: 40px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-profile-outline:hover {
      background: #f9fafb;
      color: #111827;
      border-color: #d1d5db;
    }

    .branch-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--profile-muted);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 16px;
    }

    .branch-back-link:hover {
      color: var(--profile-green);
    }

    @media (max-width: 991.98px) {
      .profile-form-card {
        max-width: none;
      }
    }
  </style>
</head>

<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main id="content" class="content py-6">
    <div class="container-fluid">

      <div class="row">
        <div class="col-12">
          <a class="branch-back-link" href="/owner/branch-list" th:href="@{/owner/branch-list}">
            <i class="ti ti-arrow-left"></i>
            <span>Quay lại danh sách chi nhánh</span>
          </a>
          <div class="mb-4">
            <h1 class="profile-page-title mb-0">Chi tiết chi nhánh</h1>
          </div>
        </div>
      </div>

      <div class="row g-4">
        <div class="col-12 col-lg-4 col-xl-3">
          <div class="profile-card h-100">
            <div class="p-5 text-center">
              <div class="profile-avatar mb-4"
                   th:text="${branch.name != null and !#strings.isEmpty(branch.name) ? #strings.substring(branch.name, 0, 1) : 'C'}">
                C
              </div>

              <h2 class="fs-5 mb-1" th:text="${branch.name}">Tên chi nhánh</h2>
              <p class="profile-muted mb-1">Chi nhánh</p>
              <p class="profile-muted small mb-3"
                 th:text="${branch.address != null ? branch.address : '—'}">
                Địa chỉ chi nhánh
              </p>

              <span class="profile-status-badge"
                    th:classappend="${branch.statusName == 'Đang hoạt động' ? '' : ' inactive'}"
                    th:text="${branch.statusName != null ? branch.statusName : '—'}">
                Đang hoạt động
              </span>

              <hr class="my-4">

              <div class="d-flex justify-content-between align-items-center small mb-0">
                <span class="profile-muted">Mã chi nhánh:</span>
                <span th:text="${branch.id}">1</span>
              </div>
            </div>
          </div>
        </div>

        <div class="col-12 col-lg-8 col-xl-7">
          <div class="profile-card profile-form-card">
            <div class="p-5">
              <h2 class="fs-5 mb-4">Thông tin chi nhánh</h2>

              <div class="mb-3">
                <label for="branchId" class="form-label">Mã chi nhánh</label>
                <input id="branchId"
                       type="text"
                       class="form-control"
                       th:value="${branch.id}"
                       readonly>
              </div>

              <div class="mb-3">
                <label for="branchName" class="form-label">Tên chi nhánh</label>
                <input id="branchName"
                       type="text"
                       class="form-control"
                       th:value="${branch.name}"
                       readonly>
              </div>

              <div class="mb-3">
                <label for="branchAddress" class="form-label">Địa chỉ</label>
                <input id="branchAddress"
                       type="text"
                       class="form-control"
                       th:value="${branch.address != null ? branch.address : '—'}"
                       readonly>
              </div>

              <div class="mb-4">
                <label for="branchStatus" class="form-label">Trạng thái</label>
                <input id="branchStatus"
                       type="text"
                       class="form-control"
                       th:value="${branch.statusName != null ? branch.statusName : '—'}"
                       readonly>
              </div>

              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <a href="/owner/branch-list"
                     th:href="@{/owner/branch-list}"
                     class="btn btn-profile-outline w-100">
                    <i class="ti ti-arrow-left"></i>
                    Quay lại danh sách
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>
</body>

</html>
