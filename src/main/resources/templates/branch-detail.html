<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title th:text="'Chi tiết chi nhánh - ' + ${branch.name}">Chi tiết chi nhánh</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
  <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
  <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">
  <style>
    :root {
      --branch-green: #009a6a;
      --branch-green-soft: #e4f6f0;
      --branch-orange: #f59f2a;
      --branch-orange-soft: #fff2db;
      --branch-ink: #202124;
      --branch-muted: #6f7787;
      --branch-line: #e3e8ef;
      --branch-panel: #ffffff;
      --branch-bg: #f5f7f9;
      --branch-font: "Be Vietnam Pro", system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      background: var(--branch-bg);
      color: var(--branch-ink);
      font-family: var(--branch-font);
      font-size: 0.9375rem;
      font-weight: 400;
      line-height: 1.65;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    body button,
    body input,
    body select,
    body textarea {
      font-family: inherit;
    }

    .branch-container {
      max-width: 960px;
      margin: 0 auto;
    }

    .branch-back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--branch-muted);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 20px;
    }

    .branch-back-link:hover {
      color: var(--branch-green);
    }

    .branch-page-head {
      margin-bottom: 28px;
    }

    .branch-page-title {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .branch-page-subtitle {
      margin: 0;
      color: var(--branch-muted);
      font-size: 0.9375rem;
    }

    .branch-panel {
      background: var(--branch-panel);
      border: 1px solid var(--branch-line);
      border-radius: 15px;
      padding: 28px;
    }

    .branch-panel-title {
      margin: 0 0 24px;
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .branch-detail-grid {
      display: grid;
      gap: 0;
    }

    .branch-detail-row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid var(--branch-line);
    }

    .branch-detail-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .branch-detail-row:first-child {
      padding-top: 0;
    }

    .branch-detail-label {
      color: #737d8d;
      font-size: 0.8125rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .branch-detail-value {
      color: #202124;
      font-size: 0.9375rem;
      font-weight: 500;
      line-height: 1.6;
      word-break: break-word;
    }

    .branch-detail-value--code {
      font-weight: 600;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .branch-status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .branch-status--active {
      color: var(--branch-green);
      background: var(--branch-green-soft);
    }

    .branch-status--review {
      color: #e88900;
      background: var(--branch-orange-soft);
    }

    @media (max-width: 575.98px) {
      .branch-panel {
        padding: 18px;
      }

      .branch-detail-row {
        grid-template-columns: 1fr;
        gap: 6px;
      }
    }
  </style>
</head>

<body>
  <div th:replace="~{fragments/topbar :: topbar}"></div>
  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

  <main id="content" class="content py-10">
    <div class="container-fluid">
      <div class="branch-container">
      <a class="branch-back-link" href="/owner/branch-list" th:href="@{/owner/branch-list}">
        <i class="ti ti-arrow-left"></i>
        <span>Quay lại danh sách chi nhánh</span>
      </a>

      <header class="branch-page-head">
        <h1 class="branch-page-title" th:text="${branch.name}">Tên chi nhánh</h1>
        <p class="branch-page-subtitle">Thông tin chi tiết chi nhánh</p>
      </header>

      <section class="branch-panel" aria-labelledby="branch-detail-title">
        <h2 id="branch-detail-title" class="branch-panel-title">Thông tin chi nhánh</h2>

        <dl class="branch-detail-grid">
          <div class="branch-detail-row">
            <dt class="branch-detail-label">Mã chi nhánh</dt>
            <dd class="branch-detail-value branch-detail-value--code" th:text="${branch.id}"></dd>
          </div>
          <div class="branch-detail-row">
            <dt class="branch-detail-label">Tên chi nhánh</dt>
            <dd class="branch-detail-value" th:text="${branch.name}"></dd>
          </div>
          <div class="branch-detail-row">
            <dt class="branch-detail-label">Địa chỉ</dt>
            <dd class="branch-detail-value" th:text="${branch.address != null ? branch.address : '—'}"></dd>
          </div>
          <div class="branch-detail-row">
            <dt class="branch-detail-label">Trạng thái</dt>
            <dd class="branch-detail-value">
              <span class="branch-status"
                    th:classappend="${branch.statusName == 'Đang hoạt động' ? 'branch-status--active' : 'branch-status--review'}"
                    th:text="${branch.statusName != null ? branch.statusName : '—'}"></span>
            </dd>
          </div>
        </dl>
      </section>
      </div>
    </div>
  </main>
</body>

</html>
