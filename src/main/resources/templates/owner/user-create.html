<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title>Tạo người dùng mới | PharmaManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
    <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">

    <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
    <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">

    <style>
        .owner-page-content {
            padding-top: 96px !important;
            padding-bottom: 48px;
        }

        @media (max-width: 991.98px) {
            .owner-page-content {
                padding-top: 84px !important;
            }
        }
        .owner-card {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
        }

        .btn-owner-primary {
            background: #059669;
            border-color: #059669;
            color: #fff;
            border-radius: 10px;
        }

        .btn-owner-primary:hover {
            background: #047857;
            border-color: #047857;
            color: #fff;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            min-height: 42px;
        }
    </style>
</head>

<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

<main id="content" class="content owner-page-content">
    <div class="container-fluid">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="fs-4 mb-1">Tạo người dùng mới</h1>
                <p class="text-secondary mb-0">Tạo tài khoản nhân viên và gán quyền theo chi nhánh</p>
            </div>

            <a th:href="@{/owner/users}" class="btn btn-outline-secondary">
                Quay lại danh sách
            </a>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">
            Có lỗi xảy ra
        </div>

        <div class="owner-card p-4">
            <form th:action="@{/owner/users/create}" th:object="${form}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="row g-4">
                    <div class="col-12 col-lg-8">
                        <h2 class="fs-6 mb-3">Thông tin tài khoản</h2>

                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập họ và tên">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" th:field="*{username}" placeholder="Nhập tên đăng nhập">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Nhập email">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{phoneNumber}"
                                   placeholder="Ví dụ: 0987654321"
                                   maxlength="10"
                                   inputmode="numeric"
                                   pattern="^0(3|5|7|8|9)[0-9]{8}$">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật khẩu ban đầu</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="Nhập mật khẩu ban đầu">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                    </div>

                    <div class="col-12 col-lg-4">
                        <h2 class="fs-6 mb-3">Phân quyền</h2>

                        <div class="mb-3">
                            <label class="form-label">Vai trò</label>
                            <select class="form-select" th:field="*{role}">
                                <option value="">-- Chọn vai trò --</option>
                                <option th:each="entry : ${roleLabels}"
                                        th:value="${entry.key}"
                                        th:text="${entry.value}">
                                    Vai trò
                                </option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('role')}" th:errors="*{role}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Chi nhánh được truy cập</label>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Trạng thái</label>
                            <select class="form-select" th:field="*{status}">
                                <option th:value="true">Đang hoạt động</option>
                                <option th:value="false">Ngừng hoạt động</option>
                            </select>
                        </div>

                        <button type="submit" class="btn btn-owner-primary w-100 mb-2">
                            Tạo người dùng
                        </button>

                        <a th:href="@{/owner/users}" class="btn btn-outline-secondary w-100">
                            Hủy
                        </a>
                    </div>
                </div>
            </form>
        </div>

    </div>
</main>

</body>
</html>
