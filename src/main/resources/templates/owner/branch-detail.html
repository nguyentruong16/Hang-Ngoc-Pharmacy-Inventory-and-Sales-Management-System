<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title th:text="'Chi tiết chi nhánh | ' + ${branch.name}">Chi tiết chi nhánh | PharmaManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
    <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">

    <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
    <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">

    <style>
        .owner-page-content {
            padding-top: 96px !important;
            padding-bottom: 48px;
        }

        @media (max-width: 991.98px) {
            .owner-page-content {
                padding-top: 84px !important;
            }
        }

        .owner-card {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
        }

        .stat-icon {
            width: 72px;
            height: 72px;
            border-radius: 999px;
            background: #e8f7f1;
            color: #059669;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .btn-owner-primary {
            background: #059669;
            border-color: #059669;
            color: #fff;
            border-radius: 10px;
        }

        .btn-owner-primary:hover {
            background: #047857;
            border-color: #047857;
            color: #fff;
        }

        .status-badge {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: #dcfce7;
            color: #059669;
        }

        .status-inactive {
            background: #fee2e2;
            color: #dc2626;
        }

        .form-control,
        .form-select {
            border-radius: 10px;
            min-height: 42px;
        }

        .form-control:disabled,
        .form-control[readonly] {
            background: #f9fafb;
            color: #6b7280;
        }
    </style>
</head>

<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

<main id="content" class="content owner-page-content">
    <div class="container-fluid">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="fs-4 mb-1">Chi tiết chi nhánh</h1>
                <p class="text-secondary mb-0">Xem và cập nhật thông tin chi nhánh</p>
            </div>

            <a th:href="@{/owner/branch-list}" class="btn btn-outline-secondary">
                Quay lại danh sách
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}">
            Cập nhật chi nhánh thành công
        </div>

        <div class="row g-4">
            <div class="col-12 col-lg-4">
                <div class="owner-card p-4 text-center h-100">
                    <div class="stat-icon mb-3"
                         th:text="${branch.name != null and !#strings.isEmpty(branch.name) ? #strings.substring(branch.name, 0, 1) : 'C'}">
                        C
                    </div>

                    <h2 class="fs-5 mb-1" th:text="${branch.name}">Tên chi nhánh</h2>
                    <p class="text-secondary small mb-2">Chi nhánh</p>
                    <p class="text-secondary small mb-3"
                       th:text="${branch.address != null ? branch.address : '—'}">
                        Địa chỉ chi nhánh
                    </p>

                    <span class="status-badge mb-4"
                          th:classappend="${branch.statusName == 'Đang hoạt động' ? ' status-active' : ' status-inactive'}"
                          th:text="${branch.statusName != null ? branch.statusName : '—'}">
                        Đang hoạt động
                    </span>

                    <hr class="my-0">

                    <div class="d-flex justify-content-between align-items-center small pt-3">
                        <span class="text-secondary">Mã chi nhánh</span>
                        <span class="fw-semibold" th:text="${branch.id}">1</span>
                    </div>
                </div>
            </div>

            <div class="col-12 col-lg-8">
                <div class="owner-card p-4">
                    <form th:action="@{/owner/branch-list/branch-detail/{id}(id=${branch.id})}"
                          th:object="${branchForm}" method="post" novalidate>
                        <div class="row g-4">
                            <div class="col-12 col-lg-8">
                                <h2 class="fs-6 mb-3">Thông tin chi nhánh</h2>

                                <div class="mb-3">
                                    <label for="branchId" class="form-label">Mã chi nhánh</label>
                                    <input id="branchId"
                                           type="text"
                                           class="form-control"
                                           th:value="${branch.id}"
                                           readonly>
                                </div>

                                <div class="mb-3">
                                    <label for="branchName" class="form-label">Tên chi nhánh <span class="text-danger">*</span></label>
                                    <input id="branchName"
                                           type="text"
                                           class="form-control"
                                           th:field="*{name}"
                                           placeholder="Nhập tên chi nhánh">
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="branchAddress" class="form-label">Địa chỉ</label>
                                    <input id="branchAddress"
                                           type="text"
                                           class="form-control"
                                           th:field="*{address}"
                                           placeholder="Nhập địa chỉ chi nhánh">
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                                </div>

                                <div class="mb-3">
                                    <label for="branchStatus" class="form-label">Trạng thái <span class="text-danger">*</span></label>
                                    <select id="branchStatus" class="form-select" th:field="*{statusName}">
                                        <option value="">-- Chọn trạng thái --</option>
                                        <option value="Đang hoạt động">Đang hoạt động</option>
                                        <option value="Ngừng hoạt động">Ngừng hoạt động</option>
                                    </select>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('statusName')}" th:errors="*{statusName}"></div>
                                </div>
                            </div>

                            <div class="col-12 col-lg-4">
                                <h2 class="fs-6 mb-3">Thao tác</h2>

                                <p class="text-secondary small mb-4">
                                    Lưu thay đổi sau khi chỉnh sửa thông tin chi nhánh.
                                </p>

                                <button type="submit" class="btn btn-owner-primary w-100 mb-2">
                                    Cập nhật chi nhánh
                                </button>

                                <a th:href="@{/owner/branch-list}" class="btn btn-outline-secondary w-100">
                                    Hủy
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</main>

</body>
</html>
