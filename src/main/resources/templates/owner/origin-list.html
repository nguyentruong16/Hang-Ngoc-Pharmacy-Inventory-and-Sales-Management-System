<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8"/>
    <title>Danh sách xuất xứ | PharmaManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
    <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">

    <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
    <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">

    <style>
        .owner-page-content {
            padding-top: 96px !important;
            padding-bottom: 48px;
        }

        @media (max-width: 991.98px) {
            .owner-page-content {
                padding-top: 84px !important;
            }
        }

        .owner-card {
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            background: #fff;
            box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
        }

        .stat-icon {
            width: 38px;
            height: 38px;
            border-radius: 999px;
            background: #e8f7f1;
            color: #059669;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-owner-primary {
            background: #059669;
            border-color: #059669;
            color: #fff;
            border-radius: 10px;
        }

        .btn-owner-primary:hover {
            background: #047857;
            border-color: #047857;
            color: #fff;
        }

        .table thead th {
            font-size: 12px;
            color: #6b7280;
            font-weight: 600;
            background: #f9fafb;
        }

        .table tbody td {
            font-size: 13px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

<main id="content" class="content owner-page-content">
    <div class="container-fluid">

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="fs-4 mb-1">Danh sách xuất xứ</h1>
                <p class="text-secondary mb-0">Quản lý xuất xứ sản phẩm trong hệ thống</p>
            </div>

            <a th:href="@{/owner/origins/create-origin}" class="btn btn-owner-primary">
                <i class="ti ti-world me-1"></i>
                Tạo xuất xứ mới
            </a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}">
            Tạo xuất xứ thành công
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-md-6 col-xl-2">
                <div class="owner-card p-4">
                    <div class="d-flex justify-content-between">
                        <div>
                            <div class="text-secondary small">Tổng xuất xứ</div>
                            <div class="fs-3 fw-bold" th:text="${totalOrigins}">0</div>
                            <div class="text-success small">Tất cả xuất xứ</div>
                        </div>
                        <div class="stat-icon">
                            <i class="ti ti-world"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="owner-card p-4 mb-4">
            <h2 class="fs-6 mb-3">Bộ lọc tìm kiếm</h2>

            <div class="row g-3">
                <div class="col-12 col-lg-8">
                    <input id="originSearch"
                           type="text"
                           class="form-control"
                           placeholder="Tìm theo tên xuất xứ"
                           autocomplete="off">
                </div>

                <div class="col-12 col-lg-2">
                    <button id="originSearchButton" type="button" class="btn btn-owner-primary w-100">
                        Tìm kiếm
                    </button>
                </div>

                <div class="col-12 col-lg-2">
                    <button id="originResetButton" type="button" class="btn btn-outline-secondary w-100">
                        Đặt lại
                    </button>
                </div>
            </div>
        </div>

        <div class="owner-card p-4">
            <h2 class="fs-6 mb-3">Danh sách xuất xứ</h2>

            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Mã xuất xứ</th>
                        <th>Tên xuất xứ</th>
                    </tr>
                    </thead>

                    <tbody id="originTableBody">
                    <tr th:each="origin : ${origins}" th:attr="data-name=${origin.name}">
                        <td th:text="${origin.id}">1</td>
                        <td class="fw-semibold" th:text="${origin.name}">Việt Nam</td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(origins)}">
                        <td colspan="2" class="text-center text-secondary py-4">
                            Chưa có xuất xứ nào.
                        </td>
                    </tr>

                    <tr id="originNoResultRow" hidden>
                        <td colspan="2" class="text-center text-secondary py-4">
                            Không tìm thấy xuất xứ phù hợp.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<script type="module">
    const searchInput = document.getElementById("originSearch");
    const searchButton = document.getElementById("originSearchButton");
    const resetButton = document.getElementById("originResetButton");
    const noResultRow = document.getElementById("originNoResultRow");
    const rows = Array.from(document.querySelectorAll("#originTableBody tr[data-name]"));

    const normalize = (value) => (value || "").toString().trim().toLowerCase();

    const applyFilters = () => {
        const keyword = normalize(searchInput.value);
        let visibleCount = 0;

        rows.forEach((row) => {
            const searchable = (row.dataset.name || "").toLowerCase();
            const isVisible = !keyword || searchable.includes(keyword);
            row.hidden = !isVisible;
            if (isVisible) {
                visibleCount += 1;
            }
        });

        noResultRow.hidden = visibleCount !== 0 || rows.length === 0;
    };

    searchInput.addEventListener("input", applyFilters);
    searchButton.addEventListener("click", applyFilters);
    resetButton.addEventListener("click", () => {
        searchInput.value = "";
        applyFilters();
        searchInput.focus();
    });
</script>

</body>
</html>
