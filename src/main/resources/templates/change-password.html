<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Change Password - Pharmacy Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
  <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">
  <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
  <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">
</head>

<body>
<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card" style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <a href="/dashboard" th:href="@{/dashboard}" class="mb-4 d-inline-block">
          <img src="./assets/images/logo.svg" th:src="@{/assets/images/logo.svg}" alt="Pharmacy Management System">
        </a>
        <h1 class="card-title h5 mb-2">Change password</h1>
        <p class="text-secondary small mb-0">Update the password for your staff account.</p>
      </div>

      <div class="alert alert-danger py-2" role="alert" th:if="${error}" th:text="${error}"></div>

      <form class="needs-validation mt-3" method="post" th:action="@{/change-password}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="mb-3">
          <label for="currentPassword" class="form-label">Current password</label>
          <input id="currentPassword" name="currentPassword" type="password" class="form-control" required>
          <div class="invalid-feedback">Please enter your current password.</div>
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">New password</label>
          <input id="newPassword" name="newPassword" type="password" class="form-control" required minlength="8">
          <div class="invalid-feedback">Password must be at least 8 characters.</div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" required minlength="8">
          <div class="invalid-feedback">Please confirm the new password.</div>
        </div>

        <button class="btn btn-primary w-100" type="submit">Change password</button>
      </form>

      <div class="text-center mt-3 small">
        <a href="/dashboard" th:href="@{/dashboard}" class="link-primary">Back to dashboard</a>
      </div>
    </div>
  </div>
</div>
</body>

</html>
