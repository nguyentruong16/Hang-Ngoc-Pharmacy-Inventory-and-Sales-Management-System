<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Đổi mật khẩu | Hang Ngoc PISMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/apple-touch-icon.png" th:href="@{/assets/images/apple-touch-icon.png}">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" th:href="@{/assets/images/favicon-32x32.png}">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon-16x16.png" th:href="@{/assets/images/favicon-16x16.png}">
  <link rel="manifest" href="./assets/site.webmanifest" th:href="@{/assets/site.webmanifest}">
  <script type="module" crossorigin src="./assets/js/main.js" th:src="@{/assets/js/main.js}"></script>
  <link rel="stylesheet" crossorigin href="./assets/css/main.css" th:href="@{/assets/css/main.css}">

  <style>
    :root {
      --pm-green: #059669;
      --pm-green-dark: #047857;
      --pm-mint: #ecfdf5;
      --pm-border: #dbe7df;
      --pm-text: #111827;
      --pm-muted: #64748b;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 16%, rgba(16, 185, 129, .18), transparent 30%),
        linear-gradient(135deg, #f0fdf4 0%, #f8fafc 52%, #e7f8ef 100%);
      color: var(--pm-text);
    }

    .password-page {
      min-height: 100vh;
      padding: 32px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-card {
      width: min(100%, 480px);
      background: #ffffff;
      border: 1px solid rgba(219, 231, 223, .9);
      border-radius: 22px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      overflow: hidden;
    }

    .brand-block {
      padding: 34px 34px 18px;
      text-align: center;
    }

    .brand-logo {
      max-height: 42px;
      width: auto;
      margin-bottom: 16px;
    }

    .brand-name {
      margin: 0;
      color: var(--pm-green-dark);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .brand-subtitle {
      margin: 6px 0 0;
      color: var(--pm-muted);
      font-size: 14px;
    }

    .password-card-body {
      padding: 10px 34px 34px;
    }

    .page-title {
      margin-bottom: 8px;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 0;
      text-align: center;
    }

    .page-description {
      margin: 0 auto 24px;
      max-width: 360px;
      color: var(--pm-muted);
      font-size: 14px;
      line-height: 1.55;
      text-align: center;
    }

    .form-label {
      color: #1f2937;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .form-control {
      min-height: 46px;
      border-color: var(--pm-border);
      border-radius: 12px;
      font-size: 14px;
    }

    .form-control:focus {
      border-color: var(--pm-green);
      box-shadow: 0 0 0 .22rem rgba(5, 150, 105, .14);
    }

    .password-field {
      position: relative;
    }

    .password-field .form-control {
      padding-left: 44px;
      padding-right: 46px;
    }

    .password-icon,
    .password-toggle {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
    }

    .password-icon {
      left: 15px;
      pointer-events: none;
    }

    .password-toggle {
      right: 10px;
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
    }

    .password-toggle:hover,
    .password-toggle:focus {
      background: var(--pm-mint);
      color: var(--pm-green-dark);
    }

    .btn-password-submit {
      min-height: 46px;
      border: 0;
      border-radius: 12px;
      background: var(--pm-green);
      color: #ffffff;
      font-weight: 800;
    }

    .btn-password-submit:hover,
    .btn-password-submit:focus {
      background: var(--pm-green-dark);
      color: #ffffff;
    }

    .back-link {
      color: var(--pm-green-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--pm-green);
      text-decoration: underline;
    }

    @media (max-width: 575.98px) {
      .password-page {
        padding: 18px 12px;
      }

      .brand-block,
      .password-card-body {
        padding-left: 22px;
        padding-right: 22px;
      }
    }
  </style>
</head>

<body>
<main class="password-page">
  <section class="password-card" aria-labelledby="changePasswordTitle">
    <div class="brand-block">
      <a href="/dashboard" th:href="@{/dashboard}" class="d-inline-block" aria-label="Hang Ngoc PISMS">
        <img class="brand-logo" src="./assets/images/logo.svg" th:src="@{/assets/images/logo.svg}" alt="Hang Ngoc PISMS">
      </a>
      <p class="brand-name">Hang Ngoc PISMS</p>
      <p class="brand-subtitle">Nhà thuốc Hằng Ngọc</p>
    </div>

    <div class="password-card-body">
      <h1 id="changePasswordTitle" class="page-title">Đổi mật khẩu</h1>
      <p class="page-description">Cập nhật mật khẩu mới để bảo mật tài khoản của bạn.</p>

      <div class="alert alert-danger py-2" role="alert" th:if="${error}" th:text="${error}"></div>
      <div class="alert alert-success py-2" role="alert" th:if="${param.success != null or success != null}">
        Mật khẩu đã được cập nhật thành công.
      </div>

      <form class="needs-validation mt-3" method="post" th:action="@{/change-password}" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
          <label for="currentPassword" class="form-label">Mật khẩu hiện tại</label>
          <div class="password-field">
            <span class="password-icon"><i class="ti ti-lock"></i></span>
            <input id="currentPassword" name="currentPassword" type="password" class="form-control" required>
            <button class="password-toggle" type="button" data-password-toggle="currentPassword" aria-label="Hiển thị mật khẩu">
              <i class="ti ti-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback">Vui lòng nhập mật khẩu hiện tại.</div>
        </div>

        <div class="mb-3">
          <label for="newPassword" class="form-label">Mật khẩu mới</label>
          <div class="password-field">
            <span class="password-icon"><i class="ti ti-lock"></i></span>
            <input id="newPassword" name="newPassword" type="password" class="form-control" required>
            <button class="password-toggle" type="button" data-password-toggle="newPassword" aria-label="Hiển thị mật khẩu">
              <i class="ti ti-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback" data-new-password-feedback>Vui lòng nhập mật khẩu mới.</div>
        </div>

        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Xác nhận mật khẩu mới</label>
          <div class="password-field">
            <span class="password-icon"><i class="ti ti-lock"></i></span>
            <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" required>
            <button class="password-toggle" type="button" data-password-toggle="confirmPassword" aria-label="Hiển thị mật khẩu">
              <i class="ti ti-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback" data-confirm-password-feedback>Vui lòng xác nhận mật khẩu mới.</div>
        </div>

        <button class="btn btn-password-submit w-100" type="submit">Cập nhật mật khẩu</button>
      </form>

      <div class="text-center mt-4 small">
        <a href="/dashboard" th:href="@{/dashboard}" class="back-link">Quay lại trang tổng quan</a>
      </div>
    </div>
  </section>
</main>
<script>
  (() => {
    const newPassword = document.querySelector('input[name="newPassword"]');
    const confirmPassword = document.querySelector('input[name="confirmPassword"]');
    const newPasswordFeedback = document.querySelector('[data-new-password-feedback]');
    const confirmPasswordFeedback = document.querySelector('[data-confirm-password-feedback]');
    const form = document.querySelector('form[method="post"]');

    if (!newPassword || !confirmPassword || !form) {
      return;
    }

    const newPasswordRequiredMessage = 'Vui lòng nhập mật khẩu mới.';
    const confirmPasswordRequiredMessage = 'Vui lòng xác nhận mật khẩu mới.';
    const confirmPasswordMismatchMessage = 'Mật khẩu xác nhận không trùng khớp.';

    const updateNewPasswordFeedback = () => {
      if (newPasswordFeedback) {
        newPasswordFeedback.textContent = newPasswordRequiredMessage;
      }
    };

    const validatePasswordConfirmation = () => {
      if (!confirmPassword.value) {
        confirmPassword.setCustomValidity('');
        if (confirmPasswordFeedback) {
          confirmPasswordFeedback.textContent = confirmPasswordRequiredMessage;
        }
        return;
      }

      if (newPassword.value !== confirmPassword.value) {
        confirmPassword.setCustomValidity(confirmPasswordMismatchMessage);
        if (confirmPasswordFeedback) {
          confirmPasswordFeedback.textContent = confirmPasswordMismatchMessage;
        }
        return;
      }

      confirmPassword.setCustomValidity('');
      if (confirmPasswordFeedback) {
        confirmPasswordFeedback.textContent = confirmPasswordRequiredMessage;
      }
    };

    newPassword.addEventListener('input', () => {
      updateNewPasswordFeedback();
      validatePasswordConfirmation();
    });
    confirmPassword.addEventListener('input', validatePasswordConfirmation);
    form.addEventListener('submit', () => {
      updateNewPasswordFeedback();
      validatePasswordConfirmation();
    });

    document.querySelectorAll('[data-password-toggle]').forEach((button) => {
      const input = document.getElementById(button.dataset.passwordToggle);
      const icon = button.querySelector('i');
      if (!input || !icon) {
        return;
      }

      button.addEventListener('click', () => {
        const shouldShow = input.type === 'password';
        input.type = shouldShow ? 'text' : 'password';
        icon.classList.toggle('ti-eye', !shouldShow);
        icon.classList.toggle('ti-eye-off', shouldShow);
        button.setAttribute('aria-label', shouldShow ? 'Ẩn mật khẩu' : 'Hiển thị mật khẩu');
      });
    });
  })();
</script>
</body>

</html>
