<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Tạo phiếu chi | PharmaManager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script type="module" crossorigin th:src="@{/assets/js/main.js}"></script>
    <link rel="stylesheet" crossorigin th:href="@{/assets/css/main.css}">

    <style>
        .expense-page-content {
            padding-top: 96px !important;
            padding-bottom: 48px;
        }

        .expense-card {
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 1px 2px rgba(16, 24, 40, .04);
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
        }

        .btn-expense-primary {
            background: #059669;
            border-color: #059669;
            color: #ffffff;
            border-radius: 12px;
        }

        .btn-expense-primary:hover {
            background: #047857;
            border-color: #047857;
            color: #ffffff;
        }

        .auto-field {
            background: #fbfdfc !important;
            color: #6b7280 !important;
            border-color: #e5e7eb;
            cursor: default;
            font-style: italic;
        }

        .form-check-input:checked {
            background-color: #059669;
            border-color: #059669;
        }

        @media (max-width: 991.98px) {
            .expense-page-content {
                padding-top: 84px !important;
            }
        }
    </style>
</head>

<body>
<div th:replace="~{fragments/topbar :: topbar}"></div>
<aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

<main id="content" class="content expense-page-content">
    <div class="container-fluid">

        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
                <h1 class="fs-4 mb-1">Tạo phiếu chi</h1>
                <p class="text-secondary mb-0">Ghi nhận một khoản tiền chi ra khỏi quỹ.</p>
            </div>
            <a th:href="${basePath}" class="btn btn-outline-secondary">
                <i class="ti ti-arrow-left me-1"></i>
                Quay lại danh sách
            </a>
        </div>

        <div th:replace="~{fragments/toast :: flash}"></div>

        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <form th:action="${basePath + '/create'}" th:object="${form}" method="post" id="expenseForm">
            <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="row g-4">
                <div class="col-12 col-xl-8">

                    <div class="expense-card p-4 mb-4">
                        <div class="section-title mb-4">
                            <i class="ti ti-cash text-success me-1"></i>
                            Thông tin phiếu chi
                        </div>

                        <div class="row g-3">
                            <div class="col-12 col-md-4">
                                <label class="form-label">Mã phiếu</label>
                                <input type="text" class="form-control auto-field" value="PC-…"
                                       readonly tabindex="-1">
                            </div>

                            <div class="col-12 col-md-4">
                                <label class="form-label">Người lập</label>
                                <input type="text" class="form-control auto-field"
                                       th:value="${creatorName != null ? creatorName : 'Tài khoản hiện tại'}"
                                       value="Tài khoản hiện tại" readonly tabindex="-1">
                            </div>

                            <div class="col-12 col-md-4">
                                <label class="form-label">Ngày chi</label>
                                <input type="date" class="form-control" th:field="*{date}" id="dateInput">
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Loại phiếu chi <span class="text-danger">*</span></label>
                                <select class="form-select" th:field="*{expenseType}" required>
                                    <option value="">-- Chọn loại phiếu chi --</option>
                                    <option th:each="entry : ${expenseTypeLabels}"
                                            th:value="${entry.key}"
                                            th:text="${entry.value}">Chi phí vận hành</option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Lý do chi <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{reason}"
                                       placeholder="VD: Tiền điện tháng 7, ứng lương nhân viên A…">
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Số tiền cần chi <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="number" min="0" step="1" class="form-control"
                                           th:field="*{amount}" id="amountInput" placeholder="0">
                                    <span class="input-group-text">đ</span>
                                </div>
                            </div>

                            <div class="col-12 col-md-6 d-flex align-items-end">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" th:field="*{fullyPaid}"
                                           id="fullyPaidInput" checked>
                                    <label class="form-check-label" for="fullyPaidInput">
                                        Đã chi đủ số tiền trên ngay bây giờ
                                    </label>
                                </div>
                            </div>

                            <div id="partialPaymentFields" class="col-12" style="display: none;">
                                <div class="row g-3">
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">Số tiền đã chi thực tế</label>
                                        <div class="input-group">
                                            <input type="number" min="0" step="1" class="form-control"
                                                   th:field="*{paid}" id="paidInput" placeholder="0">
                                            <span class="input-group-text">đ</span>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">Trong đó tiền mặt</label>
                                        <div class="input-group">
                                            <input type="number" min="0" step="1" class="form-control"
                                                   th:field="*{paidByCash}" id="cashInput" placeholder="0">
                                            <span class="input-group-text">đ</span>
                                        </div>
                                    </div>
                                    <div class="col-12 col-md-4">
                                        <label class="form-label">Trong đó chuyển khoản</label>
                                        <div class="input-group">
                                            <input type="number" min="0" step="1" class="form-control"
                                                   th:field="*{paidByBanking}" id="bankingInput" placeholder="0">
                                            <span class="input-group-text">đ</span>
                                        </div>
                                    </div>
                                    <div class="form-text">
                                        <i class="ti ti-info-circle me-1"></i>
                                        Nếu chưa chi hết, phiếu sẽ ở trạng thái "Chờ thanh toán" cho đến khi ghi nhận đủ.
                                    </div>
                                </div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Ghi chú</label>
                                <textarea class="form-control" rows="3" th:field="*{note}"
                                          placeholder="Nhập ghi chú nếu có"></textarea>
                            </div>
                        </div>
                    </div>

                </div>

                <div class="col-12 col-xl-4">
                    <div class="expense-card p-4">
                        <!-- Owner: submit auto-approves the slip. -->
                        <button th:if="${#strings.startsWith(basePath, '/owner')}"
                                type="submit" name="action" value="submit"
                                class="btn btn-expense-primary w-100 mb-3"
                                data-confirm="Tạo và duyệt phiếu chi này?">
                            <i class="ti ti-circle-check me-1"></i>
                            Tạo &amp; duyệt
                        </button>

                        <!-- Accountant: submit sends the slip to the Owner for approval. -->
                        <button th:unless="${#strings.startsWith(basePath, '/owner')}"
                                type="submit" name="action" value="submit"
                                class="btn btn-expense-primary w-100 mb-3"
                                data-confirm="Gửi phiếu chi này cho chủ nhà thuốc duyệt?">
                            <i class="ti ti-send me-1"></i>
                            Gửi duyệt
                        </button>

                        <button type="submit" name="action" value="draft"
                                class="btn btn-outline-secondary w-100">
                            <i class="ti ti-device-floppy me-1"></i>
                            Lưu nháp
                        </button>
                    </div>
                </div>
            </div>
        </form>

    </div>
</main>

<script>
    function today() {
        const date = new Date();
        const offset = date.getTimezoneOffset();
        return new Date(date.getTime() - offset * 60000).toISOString().split('T')[0];
    }

    function togglePartialPaymentFields() {
        const fullyPaid = document.getElementById('fullyPaidInput').checked;
        document.getElementById('partialPaymentFields').style.display = fullyPaid ? 'none' : '';
    }

    document.addEventListener('DOMContentLoaded', function () {
        const dateInput = document.getElementById('dateInput');
        if (!dateInput.value) {
            dateInput.value = today();
        }

        document.getElementById('fullyPaidInput').addEventListener('change', togglePartialPaymentFields);
        togglePartialPaymentFields();

        document.getElementById('expenseForm').addEventListener('submit', function (event) {
            const amount = Number(document.getElementById('amountInput').value || 0);
            if (amount <= 0) {
                event.preventDefault();
                if (window.pmToast) {
                    pmToast('Vui lòng nhập số tiền cần chi lớn hơn 0.', 'error');
                } else {
                    alert('Vui lòng nhập số tiền cần chi lớn hơn 0.');
                }
            }
        });
    });
</script>

</body>
</html>
