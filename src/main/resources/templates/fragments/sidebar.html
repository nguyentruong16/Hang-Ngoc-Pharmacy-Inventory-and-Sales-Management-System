<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<body>
<!--
  Reusable, role-based sidebar. Single source of truth for navigation chrome.
  Renders whatever the SidebarInterceptor put on the model:
    - sidebarMenu : List<SidebarMenuGroup> for the current role
    - activeUrl   : URL of the item to highlight for the current request
  Behaviour:
    * A group with one item renders as a plain link (no header, no collapse).
    * A group with several items is a collapsible section: hover or click the title to open;
      it stays open when it contains the active page. In the icon-rail (collapsed) sidebar all
      items are shown flat.
  Keeps id="sidebar" so the existing bundled main.js toggle keeps working.
  Usage in a page:  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
-->
<th:block th:fragment="sidebar">
  <aside id="sidebar" class="sidebar">
    <div class="logo-area">
      <a href="/" th:href="@{/}" class="d-inline-flex"><img src="data:image/svg+xml,%3csvg%20width='62'%20height='67'%20viewBox='0%200%2062%2067'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%3e%3cpath%20d='M30.604%2066.378L0.00805664%2048.1582V35.7825L30.604%2054.0023V66.378Z'%20fill='%23302C4D'/%3e%3cpath%20d='M61.1996%2048.1582L30.604%2066.378V54.0023L61.1996%2035.7825V48.1582Z'%20fill='%23E66239'/%3e%3cpath%20d='M30.5955%200L0%2018.2198V30.5955L30.5955%2012.3757V0Z'%20fill='%23657E92'/%3e%3cpath%20d='M61.191%2018.2198L30.5955%200V12.3757L61.191%2030.5955V18.2198Z'%20fill='%23A3B2BE'/%3e%3cpath%20d='M30.604%2048.8457L0.00805664%2030.6259V18.2498L30.604%2036.47V48.8457Z'%20fill='%23302C4D'/%3e%3cpath%20d='M61.1996%2030.6259L30.604%2048.8457V36.47L61.1996%2018.2498V30.6259Z'%20fill='%23E66239'/%3e%3c/svg%3e" alt="" width="24">
        <span class="logo-text ms-2"> <img src="./assets/images/logo.svg" th:src="@{/assets/images/logo.svg}" alt=""></span>
      </a>
    </div>
    <ul class="nav flex-column pm-sidebar-nav" id="sidebarNav">
      <th:block th:each="group : ${sidebarMenu}">

        <!-- Single link -->
        <li th:if="${!group.collapsible}" class="pm-nav-item" th:with="item=${group.items[0]}">
          <a class="pm-nav-link" th:href="@{${item.url}}"
             th:classappend="${activeUrl != null and activeUrl == item.url} ? ' active' : ''">
            <i th:class="${item.icon}" class="ti ti-point"></i>
            <span class="pm-nav-text" th:text="${item.label}">Menu item</span>
          </a>
        </li>

        <!-- Collapsible group -->
        <li th:if="${group.collapsible}" class="pm-nav-section"
            th:classappend="${activeUrl != null and #lists.contains(group.items.![url], activeUrl)} ? ' open active-section' : ''">

          <button type="button" class="pm-nav-parent">
        <span class="pm-parent-left">
          <i th:class="${group.items[0].icon}" class="ti ti-folder"></i>
          <span class="pm-nav-text" th:text="${group.label}">Nhóm</span>
        </span>
            <span class="pm-caret" aria-hidden="true">›</span>
          </button>

          <div class="pm-submenu-wrap">
            <ul class="pm-submenu">
              <li th:each="item : ${group.items}">
                <a class="pm-submenu-link" th:href="@{${item.url}}"
                   th:classappend="${activeUrl != null and activeUrl == item.url} ? ' active' : ''">
                  <span th:text="${item.label}">Sub item</span>
                </a>
              </li>
            </ul>
          </div>
        </li>

      </th:block>
    </ul>
  </aside>

  <style>
    /* Sidebar base */
    #sidebar {
      width: 240px;
      height: 100vh;
      max-height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      background: #ffffff;
      border-right: 1px solid #e5e7eb;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,.18) transparent;
      padding-bottom: 24px;
    }

    #sidebar::-webkit-scrollbar {
      width: 5px;
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,.16);
      border-radius: 999px;
    }

    #sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(0,0,0,.28);
    }

    /* Logo */
    .sidebar .logo-area {
      height: 64px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #eef0f3;
      background: #ffffff;
    }

    .sidebar .logo-area a {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .sidebar .logo-text img {
      max-height: 28px;
    }

    /* Nav wrapper */
    .pm-sidebar-nav {
      padding: 12px 0 24px 0;
      margin: 0;
    }

    .pm-nav-item,
    .pm-nav-section {
      list-style: none;
    }

    /* Single nav link */
    .pm-nav-link {
      min-height: 40px;
      padding: 10px 18px 10px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #1f2937;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      border-radius: 0;
    }

    .pm-nav-link i {
      width: 18px;
      min-width: 18px;
      font-size: 18px;
      color: currentColor;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .pm-nav-link:hover,
    .pm-nav-link.active {
      color: #008f5a;
      background: #f3f4f6;
      font-weight: 600;
    }

    /* Parent group button */
    .pm-nav-parent {
      width: 100%;
      min-height: 40px;
      padding: 10px 14px 10px 22px;
      border: 0;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1f2937;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      line-height: 1.3;
      cursor: pointer;
      text-align: left;
    }

    .pm-parent-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }

    .pm-parent-left i {
      width: 18px;
      min-width: 18px;
      font-size: 18px;
      color: currentColor;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .pm-nav-parent:hover {
      color: #008f5a;
      background: #f7f8f9;
    }

    .pm-nav-section.active-section > .pm-nav-parent {
      color: #008f5a;
      background: #f3f4f6;
      font-weight: 600;
    }

    .pm-nav-text {
      min-width: 0;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }

    /* Caret */
    .pm-caret {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      min-width: 16px;
      height: 16px;
      font-size: 18px;
      line-height: 1;
      color: #6b7280;
      transition: transform .28s cubic-bezier(.4, 0, .2, 1);
    }

    .pm-nav-section.open > .pm-nav-parent .pm-caret {
      transform: rotate(90deg);
    }

    /* Smooth submenu wrapper */
    .pm-submenu-wrap {
      display: grid;
      grid-template-rows: 0fr;
      opacity: 0;
      overflow: hidden;
      transition:
              grid-template-rows .28s cubic-bezier(.4, 0, .2, 1),
              opacity .18s ease,
              margin .18s ease;
    }

    .pm-nav-section.open > .pm-submenu-wrap {
      grid-template-rows: 1fr;
      opacity: 1;
      margin: 2px 0 6px 0;
    }

    /* Inner submenu */
    .pm-submenu {
      min-height: 0;
      list-style: none;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    .pm-submenu li {
      list-style: none;
    }

    .pm-submenu-link {
      display: block;
      padding: 7px 12px 7px 58px;
      color: #6b7280;
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      line-height: 1.35;
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
    }

    .pm-submenu-link:hover {
      color: #008f5a;
      background: #f7f8f9;
    }

    .pm-submenu-link.active {
      color: #008f5a;
      font-weight: 600;
      background: #f3f4f6;
    }

    /* Collapsed sidebar support */
    .sidebar.collapsed {
      width: 60px;
    }

    .sidebar.collapsed .logo-text,
    .sidebar.collapsed .pm-nav-text,
    .sidebar.collapsed .pm-caret,
    .sidebar.collapsed .pm-submenu {
      display: none;
    }

    .sidebar.collapsed .pm-nav-link,
    .sidebar.collapsed .pm-nav-parent {
      justify-content: center;
      padding: 10px 0;
    }

    .sidebar.collapsed .pm-parent-left {
      justify-content: center;
    }

    .sidebar.collapsed .pm-nav-link i,
    .sidebar.collapsed .pm-parent-left i {
      margin: 0;
    }
  </style>

  <script>
    (function () {
      var nav = document.getElementById('sidebarNav');
      if (!nav) return;

      nav.querySelectorAll('.pm-nav-parent').forEach(function (button) {
        button.addEventListener('click', function () {
          var section = button.closest('.pm-nav-section');
          if (!section) return;

          section.classList.toggle('open');
        });
      });
    })();
  </script>
</th:block>
</body>

</html>
