<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<body>
<!--
  Reusable, role-based sidebar. Single source of truth for navigation chrome.
  Renders whatever the SidebarInterceptor put on the model:
    - sidebarMenu : List<SidebarMenuGroup> for the current role
    - activeUrl   : URL of the item to highlight for the current request
  Behaviour:
    * The sidebar is full width (no icon-rail, no collapse button) and scrolls vertically
      when the menu is long.
    * A group with one item renders as a plain link (no header, no collapse).
    * A group with several items is a collapsible section: click the title to open/close it.
      Several groups can stay open at once, and a group that contains the active page is open
      by default.
  Keeps id="sidebar" so the existing bundled main.js mobile toggle keeps working.
  Usage in a page:  <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>
-->
<th:block th:fragment="sidebar">
    <aside id="sidebar" class="sidebar">
        <div class="logo-area">
            <a href="/" th:href="@{/}" class="d-inline-flex">
                <img src="./assets/images/logo-icon.png" th:src="@{/assets/images/logo-icon.png}"
                     alt="Nhà thuốc Hằng Ngọc" width="32" height="32">
                <span class="logo-text ms-2">Nhà thuốc Hằng Ngọc</span>
            </a>
        </div>
        <ul class="nav flex-column pm-sidebar-nav" id="sidebarNav">
            <th:block th:each="group : ${sidebarMenu}">

                <!-- Single link -->
                <li th:if="${!group.collapsible}" class="pm-nav-item" th:with="item=${group.items[0]}">
                    <a class="pm-nav-link" th:href="@{${item.url}}"
                       th:classappend="${activeUrl != null and activeUrl == item.url} ? ' active' : ''">
                        <i th:class="${item.icon}" class="ti ti-point"></i>
                        <span class="pm-nav-text" th:text="${item.label}">Menu item</span>
                    </a>
                </li>

                <!-- Collapsible group -->
                <li th:if="${group.collapsible}" class="pm-nav-section"
                    th:classappend="${activeUrl != null and #lists.contains(group.items.![url], activeUrl)} ? ' open active-section' : ''">

                    <button type="button" class="pm-nav-parent">
        <span class="pm-parent-left">
          <i th:class="${group.icon}" class="ti ti-folder"></i>
          <span class="pm-nav-text" th:text="${group.label}">Nhóm</span>
        </span>
                        <span class="pm-caret" aria-hidden="true">›</span>
                    </button>

                    <div class="pm-submenu-wrap">
                        <ul class="pm-submenu">
                            <li th:each="item : ${group.items}">
                                <a class="pm-submenu-link" th:href="@{${item.url}}"
                                   th:classappend="${activeUrl != null and activeUrl == item.url} ? ' active' : ''">
                                    <span th:text="${item.label}">Sub item</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </li>

            </th:block>
        </ul>
    </aside>

    <style>
        /* Sidebar base */
        #sidebar {
            width: 240px;
            height: 100vh;
            max-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, .18) transparent;
            padding-bottom: 24px;
        }

        #sidebar::-webkit-scrollbar {
            width: 5px;
        }

        #sidebar::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, .16);
            border-radius: 999px;
        }

        #sidebar::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, .28);
        }

        /* Logo */
        .sidebar .logo-area {
            height: 64px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eef0f3;
            background: #ffffff;
        }

        .sidebar .logo-area a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .sidebar .logo-area img {
            border-radius: 6px;
        }

        .sidebar .logo-text {
            font-size: 15px;
            font-weight: 700;
            color: #059669;
            white-space: nowrap;
        }

        /* Nav wrapper */
        .pm-sidebar-nav {
            padding: 12px 0 24px 0;
            margin: 0;
        }

        .pm-nav-item,
        .pm-nav-section {
            list-style: none;
        }

        /* Single nav link */
        .pm-nav-link {
            min-height: 40px;
            padding: 10px 18px 10px 22px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #1f2937;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.3;
            border-radius: 0;
        }

        .pm-nav-link i {
            width: 18px;
            min-width: 18px;
            font-size: 18px;
            color: currentColor;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .pm-nav-link:hover,
        .pm-nav-link.active {
            color: #059669;
            background: #e8f7f1;
            font-weight: 600;
        }

        /* Parent group button */
        .pm-nav-parent {
            width: 100%;
            min-height: 40px;
            padding: 10px 14px 10px 22px;
            border: 0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #1f2937;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.3;
            cursor: pointer;
            text-align: left;
        }

        .pm-parent-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            flex: 1;
        }

        .pm-parent-left i {
            width: 18px;
            min-width: 18px;
            font-size: 18px;
            color: currentColor;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .pm-nav-parent:hover {
            color: #059669;
            background: #f7f8f9;
        }

        .pm-nav-section.active-section > .pm-nav-parent {
            color: #059669;
            background: #e8f7f1;
            font-weight: 600;
        }

        .pm-nav-text {
            min-width: 0;
            white-space: normal;
            overflow: visible;
            text-overflow: unset;
        }

        /* Caret */
        .pm-caret {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            min-width: 16px;
            height: 16px;
            font-size: 18px;
            line-height: 1;
            color: #6b7280;
            transition: transform .28s cubic-bezier(.4, 0, .2, 1);
        }

        .pm-nav-section.open > .pm-nav-parent .pm-caret {
            transform: rotate(90deg);
        }

        /* Smooth submenu wrapper */
        .pm-submenu-wrap {
            display: grid;
            grid-template-rows: 0fr;
            opacity: 0;
            overflow: hidden;
            transition: grid-template-rows .28s cubic-bezier(.4, 0, .2, 1),
            opacity .18s ease,
            margin .18s ease;
        }

        .pm-nav-section.open > .pm-submenu-wrap {
            grid-template-rows: 1fr;
            opacity: 1;
            margin: 2px 0 6px 0;
        }

        /* Inner submenu */
        .pm-submenu {
            min-height: 0;
            list-style: none;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .pm-submenu li {
            list-style: none;
        }

        .pm-submenu-link {
            display: block;
            padding: 7px 12px 7px 58px;
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
            font-weight: 400;
            line-height: 1.35;
            white-space: normal;
            overflow: visible;
            text-overflow: unset;
        }

        .pm-submenu-link:hover {
            color: #059669;
            background: #f7f8f9;
        }

        .pm-submenu-link.active {
            color: #059669;
            font-weight: 600;
            background: #e8f7f1;
        }
    </style>

    <script>
        (function () {
            var nav = document.getElementById('sidebarNav');
            if (!nav) return;

            nav.querySelectorAll('.pm-nav-parent').forEach(function (button) {
                button.addEventListener('click', function () {
                    var section = button.closest('.pm-nav-section');
                    if (!section) return;

                    section.classList.toggle('open');
                });
            });
        })();
    </script>
</th:block>
</body>

</html>
